<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1D2023; }
#chart { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
let chart = null;
let candleSeries = null;
let volumeSeries = null;
let ma5Series = null;
let ma20Series = null;

function initChart() {
    chart = createChart(document.getElementById('chart'), {
        layout: {
            background: { type: 'solid', color: '#1D2023' },
            textColor: '#E1E2E7',
            fontSize: 11,
            fontFamily: 'JetBrains Mono, monospace'
        },
        grid: {
            vertLines: { color: '#3B4A3D', style: 2 },
            horzLines: { color: '#3B4A3D', style: 2 }
        },
        crosshair: {
            mode: 0,
            vertLine: { color: '#859585', width: 1, style: 2, labelBackgroundColor: '#323538' },
            horzLine: { color: '#859585', width: 1, style: 2, labelBackgroundColor: '#323538' }
        },
        rightPriceScale: {
            borderColor: '#3B4A3D',
            textColor: '#859585'
        },
        timeScale: {
            borderColor: '#3B4A3D',
            textColor: '#859585',
            timeVisible: false
        },
        handleScroll: false,
        handleScale: false,
    });

    candleSeries = chart.addCandlestickSeries({
        upColor: '#75FF9E',
        downColor: '#FF5C72',
        borderUpColor: '#75FF9E',
        borderDownColor: '#FF5C72',
        wickUpColor: '#75FF9E',
        wickDownColor: '#FF5C72'
    });

    volumeSeries = chart.addHistogramSeries({
        priceFormat: { type: 'volume' },
        priceScaleId: 'volume',
        color: '#3B4A3D'
    });

    ma5Series = chart.addLineSeries({
        color: '#CEE8FF',
        lineWidth: 1,
        priceLineVisible: false,
        lastValueVisible: false,
        visible: true
    });

    ma20Series = chart.addLineSeries({
        color: '#859585',
        lineWidth: 1,
        lineStyle: 2,
        priceLineVisible: false,
        lastValueVisible: false,
        visible: true
    });

    chart.timeScale().fitContent();
}

function updateData(data) {
    if (!data || data.length === 0) return;
    
    const candles = data.map(d => ({
        time: d.timestamp,
        open: d.open,
        high: d.high,
        low: d.low,
        close: d.close
    }));
    candleSeries.setData(candles);

    const volumes = data.map(d => ({
        time: d.timestamp,
        value: d.volume,
        color: d.close >= d.open ? '#75FF9E' : '#FF5C72'
    }));
    volumeSeries.setData(volumes);

    // MA5
    if (data.length >= 5) {
        const ma5 = data.slice(4).map((d, i) => {
            let sum = 0;
            for (let j = i; j < i + 5; j++) sum += data[j].close;
            return { time: d.timestamp, value: sum / 5 };
        });
        ma5Series.setData(ma5);
    }

    // MA20
    if (data.length >= 20) {
        const ma20 = data.slice(19).map((d, i) => {
            let sum = 0;
            for (let j = i; j < i + 20; j++) sum += data[j].close;
            return { time: d.timestamp, value: sum / 20 };
        });
        ma20Series.setData(ma20);
    }

    chart.timeScale().fitContent();
}

// Listen for Qt WebChannel messages
function onQtDataReceived(jsonData) {
    try {
        const data = JSON.parse(jsonData);
        updateData(data);
    } catch(e) {
        console.error('Invalid data:', e);
    }
}

// Initialize
initChart();
</script>
</body>
</html>
