# Niskala - Production Docker Compose
# Version: 1.0.0
# For VPS deployment (2 vCPU, 2GB RAM)

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: niskala-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - niskala
    deploy:
      resources:
        limits:
          memory: 50M

  api:
    build:
      context: .
      dockerfile: gcp/Dockerfile.api
    container_name: niskala-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://niskala:${DB_PASSWORD}@postgres:5432/niskala
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
      - APP_NAME=${APP_NAME:-Niskala}
      - APP_VERSION=${APP_VERSION:-1.0.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - niskala
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 500M

  worker:
    build:
      context: .
      dockerfile: gcp/Dockerfile.worker
    container_name: niskala-worker
    environment:
      - DATABASE_URL=postgresql://niskala:${DB_PASSWORD}@postgres:5432/niskala
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - WORKER_CONCURRENCY=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - niskala
    deploy:
      resources:
        limits:
          memory: 300M

  postgres:
    image: postgres:15-alpine
    container_name: niskala-postgres
    environment:
      POSTGRES_DB: niskala
      POSTGRES_USER: niskala
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - niskala
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U niskala -d niskala"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  redis:
    image: redis:7-alpine
    container_name: niskala-redis
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - niskala
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 250M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  niskala:
    driver: bridge
